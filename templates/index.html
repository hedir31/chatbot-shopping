<!DOCTYPE html>
<html>
<head>
    <title>AI Chat Shopping</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="app">

    <div class="sidebar">
        <div class="sidebar-header">
            <h2>🤖 Shopping Bot</h2>
            <button class="new-chat-btn" onclick="createNewChat()"><i class="fas fa-plus"></i> New Chat</button>
        </div>
        
        <div class="history-section">
            <p class="history-title"><i class="fas fa-history"></i> Recent Chats</p>
            <div id="history-list" class="history-list">
                <div class="history-item active"><i class="far fa-comment"></i> Discussion Actuelle</div>
            </div>
        </div>
    </div>

    <div class="chat-container">
        <div id="messages" class="messages">
            <div class="msg bot"welcome to chicbot, how can i help u today !🛍️</div>
        </div>

        <div class="input-area">
            <input id="input" placeholder="Ask about products..." 
                onkeydown="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">➤</button>
        </div>
    </div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
